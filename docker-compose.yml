version: '3.8'

services:
  elektron-pool:
    container_name: elektron-pool
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${STRATUM_PORT}:${STRATUM_PORT}/tcp"
      - "127.0.0.1:${API_PORT}:${API_PORT}/tcp"
    volumes:
      - "./${NETWORK}-DB:/elektron-pool/DB"
      - "./.env:/elektron-pool/.env:ro"
    environment:
      - NODE_ENV=production
